name: OS-Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y nasm gcc-multilib binutils make
      - name: Build
        run: make
      - uses: actions/upload-artifact@v3
        with:
          name: project637-os-image
          path: project637-os.bin

